<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDounloader — Universal Media Downloader</title>
    <meta name="description" content="Free universal media downloader. Save videos and audio from YouTube, TikTok, Instagram, LinkedIn, and more in HD quality." />
    <script>
      (function(){try{var s=localStorage.getItem('ttok-theme');var d=s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.classList.toggle('dark',d);}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
